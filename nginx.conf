# ==============================================
# MyGuyAI Nginx Configuration - Phase 6
# Production-Ready SEO Routing & Caching
# ==============================================

# Upstream definitions
upstream frontend {
    server 127.0.0.1:3000;
}

upstream backend {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    server_name myguyai.com www.myguyai.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name myguyai.com www.myguyai.com;
    
    # SSL configuration (update with actual cert paths)
    # ssl_certificate /etc/letsencrypt/live/myguyai.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/myguyai.com/privkey.pem;
    
    # Root directory for static files
    root /app/frontend/public;
    index index.html;
    
    # ==============================================
    # TRAILING SLASH POLICY
    # 301 redirect /path/ -> /path (except root)
    # ==============================================
    rewrite ^(.+)/$ $1 permanent;
    
    # ==============================================
    # SEO STATIC HTML PAGES (Clean URLs)
    # Serve .html files at clean routes
    # ==============================================
    
    # Compression pages: /compress-image-to-50kb -> compress-image-to-50kb.html
    location ~ ^/(compress-image-to-\d+(?:kb|mb))$ {
        try_files /$1.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "SAMEORIGIN";
    }
    
    # Trust pages: /about, /contact, /privacy-policy, /terms
    location ~ ^/(about|contact|privacy-policy|terms)$ {
        try_files /$1.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    
    # Blog and Guides directories
    location ~ ^/(blog|guides)$ {
        try_files /$1/index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    
    # ==============================================
    # STATIC ASSETS CACHING (1 Year, Immutable)
    # ==============================================
    
    # CSS files
    location ~* \.css$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
    }
    
    # JavaScript files
    location ~* \.js$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
    }
    
    # Images
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
    }
    
    # Fonts
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
    
    # ==============================================
    # SEO FILES (Public Access)
    # ==============================================
    
    # Sitemap
    location = /sitemap.xml {
        try_files /sitemap.xml =404;
        add_header Content-Type "application/xml";
        add_header Cache-Control "public, max-age=3600";
    }
    
    # Robots.txt
    location = /robots.txt {
        try_files /robots.txt =404;
        add_header Content-Type "text/plain";
        add_header Cache-Control "public, max-age=86400";
    }
    
    # Ads.txt (AdSense verification)
    location = /ads.txt {
        proxy_pass http://backend/api/ads.txt;
        add_header Content-Type "text/plain";
        add_header Cache-Control "public, max-age=86400";
    }
    
    # ==============================================
    # API ROUTES (Proxy to FastAPI Backend)
    # ==============================================
    
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # No caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    
    # ==============================================
    # REACT SPA FALLBACK
    # For all other routes, serve React app
    # ==============================================
    
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    
    # ==============================================
    # CUSTOM 404 ERROR PAGE
    # ==============================================
    
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    
    # ==============================================
    # SECURITY HEADERS
    # ==============================================
    
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ==============================================
    # GZIP COMPRESSION
    # ==============================================
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
}
